<div class="bookings-container">
  <section class="cost-section">
    <h3 class="section-title">Estimated Daily Costs</h3>

    <div class="costs-grid">
      <div class="cost-item">
        <span class="cost-label">Accommodation</span>
        <app-cost-badge
          [estimatedCost]="getCostValue('accommodation')"
          [isPaid]="false"
          [iconName]="'hotel'"
          [iconColor]="getCategoryColor('accommodation')"
          [step]="10"
          [min]="0"
          (save)="updateCost('accommodation', $event)">
        </app-cost-badge>
      </div>

      @for (cat of simpleCategories; track cat.id) {
        <div class="cost-item">
          <span class="cost-label">{{ cat.label }}</span>
          <app-cost
            mode="simple"
            [estimatedCost]="getCostValue(cat.id)"
            [isPaid]="false"
            [actualTotal]="null"
            [expenses]="[]"
            [iconName]="cat.icon"
            [iconColor]="getCategoryColor(cat.id)"
            [step]="5"
            [min]="0"
            (saveEstimated)="updateCost(cat.id, $event)"
            (addExpense)="addDailyExpense(cat.id, $event)"
            (updateExpense)="updateDailyExpense($event)"
            (deleteExpense)="deleteDailyExpense($event)">
          </app-cost>
        </div>
      }
    </div>
  </section>

  <section class="tickets-section">
    <h4 class="section-title">Tickets & Documents</h4>
    <div class="empty-docs">
      <i-lucide name="ticket" class="big-icon"></i-lucide>
      <p>No documents attached yet.</p>
      <button class="add-btn">Add Ticket</button>
    </div>
  </section>
</div>
