<div class="bookings-container">

  <!-- Daily costs -->
  <section class="cost-section">
    <h3 class="section-title">Daily Costs</h3>
    <div class="costs-grid daily-grid">
      @for (cat of dailyCategories; track cat.id) {
        <div class="cost-item">
          <span class="cost-label">{{ cat.label }}</span>
          <app-cost-badge
            [estimatedCost]="getEstimatedCost(cat.id)"
            [actualCost]="getActualCost(cat.id)"
            [isPaid]="false"
            [actualReadonly]="true"
            [hasExpenses]="getActualCost(cat.id) !== null"
            [iconName]="cat.icon"
            [iconColor]="getCategoryColor(cat.id)"
            [step]="cat.step"
            [min]="0"
            (saveEstimated)="updateEstimatedCost(cat.id, $event)">
          </app-cost-badge>
        </div>
      }
    </div>
  </section>

  <!-- One-time costs -->
  <section class="cost-section">
    <h3 class="section-title">One-time Costs</h3>
    <div class="costs-grid one-time-grid">
      @for (cat of oneTimeCategories; track cat.id) {
        <div class="cost-item">
          <span class="cost-label">{{ cat.label }}</span>
          <app-cost-badge
            [estimatedCost]="getEstimatedCost(cat.id)"
            [actualCost]="getActualCost(cat.id)"
            [isPaid]="false"
            [readonly]="true"
            [hasExpenses]="getActualCost(cat.id) !== null"
            [iconName]="cat.icon"
            [iconColor]="getCategoryColor(cat.id)"
            [step]="cat.step"
            [min]="0"
            (saveEstimated)="updateEstimatedCost(cat.id, $event)">
          </app-cost-badge>
        </div>
      }
    </div>
  </section>

  <!-- Daily expenses (food/misc ledger) -->
  <app-expenses [place]="place()"></app-expenses>

  <app-place-bookings [place]="place()"></app-place-bookings>
