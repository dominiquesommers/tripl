<div class="notes-container">
<!--  <h3 class="section-title">Notes</h3>-->
  @for (note of notes(); track note.id) {
    <div class="note-item bottom-right-radius" [class.excluded]="!note.included()">

      @if (authService.canEdit()) {
        <div class="note-actions-top">
          <button class="icon-btn visibility"
                  (click)="updateNote(note, { included: !note.included() })"
                  [title]="note.included() ? 'Exclude from trip' : 'Include in trip'">
            <lucide-icon [name]="note.included() ? 'eye' : 'eye-off'" [size]="14"></lucide-icon>
          </button>

          <button class="icon-btn delete" (click)="deleteNote(note)">
            <lucide-icon name="trash-2" [size]="14"></lucide-icon>
          </button>
        </div>
      }

      <div class="seamless-text-container">
        <app-rich-textarea
          [value]="note.description()"
          [placeholder]="'Add description...'"
          (saveValue)="updateNote(note, { description: $event || undefined })">
        </app-rich-textarea>
      </div>

      @if (authService.canEdit()) {
        <div class="cost-row">
          <app-cost
            [estimatedCost]="note.estimated_cost() ?? 0"
            [actualTotal]="note.actual_cost()"
            [isPaid]="note.isPaid()"
            [expenses]="note.expenses()"
            (saveEstimated)="updateNote(note, { estimated_cost: $event })"
            (saveActual)="updateNote(note, { actual_cost: $event })"
            (removeActual)="removeActual(note)"
            (addExpense)="addExpense(note, $event)"
            (updateExpense)="updateExpense($event)"
            (deleteExpense)="deleteExpense($event)"
            (fetchExpenses)="tripService.fetchExpenseDetails(note.id, 'place_note').subscribe()">
          </app-cost>
        </div>
      }
    </div>
  }

  @if (authService.canEdit()) {
    <div class="note-item add-ghost"
       [class.editing]="isAdding()"
       (click)="!isAdding() && isAdding.set(true)">

      <div class="seamless-text-container">
        <app-rich-textarea
          [value]="''"
          placeholder="Add new note..."
          (saveValue)="onAddNote($event)">
        </app-rich-textarea>
      </div>

      @if (isAdding()) {
        <div class="cost-corner-anchor">
           <span class="hint-text">Shift+Enter to Save • Esc to Cancel</span>
        </div>
      }
    </div>
  }
</div>
