<div class="notes-container">
  @for (act of notes(); track act.id) {
    <div class="note-item bottom-right-radius">

      @if (authService.canEdit()) {
        <div class="note-actions-top">
          <button class="icon-btn delete" (click)="deleteNote(act)">
            <lucide-icon name="trash-2" [size]="14"></lucide-icon>
          </button>
        </div>
      }

      <div class="seamless-text-container">
        <app-rich-textarea
          [value]="act.description()"
          [placeholder]="'Add description...'"
          (saveValue)="updateNote(act, { description: $event || undefined })">
        </app-rich-textarea>
      </div>
    </div>
  }

  @if (authService.canEdit()) {
    <div class="note-item add-ghost"
       [class.editing]="isAdding()"
       (click)="!isAdding() && isAdding.set(true)">

      <div class="seamless-text-container">
        <app-rich-textarea
          [value]="''"
          placeholder="Add new note..."
          (saveValue)="onAddNote($event)">
        </app-rich-textarea>
      </div>

      @if (isAdding()) {
        <div class="cost-corner-anchor">
           <span class="hint-text">Shift+Enter to Save • Esc to Cancel</span>
        </div>
      }
    </div>
  }
</div>
