<div class="bubble-dropdown cost-popup-view" data-popup>

  <div class="manager-header">
    <div style="width: 32px;"></div>
    <span class="header-title">Payments</span>
    <button class="icon-btn" (click)="addNew()" title="Add payment">
      <lucide-icon name="plus" [size]="18"></lucide-icon>
    </button>
  </div>

  <div class="scroll-container">

    @if (expensesOrdered().length > 0) {
      <div class="ledger-rows">
        @for (exp of expensesOrdered(); track exp.id) {
          <div class="ledger-row" [class.is-editing]="editingId() === exp.id">

            <!-- Date -->
            <app-date-picker
              mode="date"
              displayFormat="compact"
              [value]="toDate(exp.date())"
              (valueChange)="updateDate(exp, $event)">
            </app-date-picker>

            <!-- Amount badge -->
            <app-editable-badge
              [value]="exp.amount()"
              prefix="€"
              [step]="1"
              [min]="0"
              (save)="updateAmount(exp, $event)">
            </app-editable-badge>

            <!-- Details -->
            <input
              type="text"
              class="details-input"
              placeholder="Details..."
              [value]="exp.details() ?? ''"
              (blur)="updateDetails(exp, $any($event.target).value)" />

            <!-- Delete (hover only) -->
            <button class="icon-btn delete-item"
                    (click)="onDelete(exp, $event)"
                    title="Delete">
              <lucide-icon name="trash-2" [size]="13"></lucide-icon>
            </button>

          </div>
        }
      </div>
    } @else {
      <p class="empty-hint">No payments recorded yet.</p>
    }

  </div>

</div>
